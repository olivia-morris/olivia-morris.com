  <title>Contact — Olivia Morris</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-section {
      padding: 80px 0 100px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .contact-left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      line-height: 1.1;
      color: var(--black);
      margin-bottom: 16px;
    }
    .contact-left p {
      font-size: 15px;
      color: var(--gray);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }
    .contact-detail {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact-detail:hover {
      color: var(--black);
    }
    .contact-detail svg {
      width: 16px; height: 16px;
      fill: var(--gray);
      flex-shrink: 0;
    }
    .form-embed {
      width: 100%;
    }
    .form-embed iframe {
      width: 100%;
      max-width: 640px;
      border: none;
    }
    @media (max-width: 680px) {
      .contact-section {
        grid-template-columns: 1fr;
        gap: 48px;
        padding: 60px 0 80px;
      }
      .contact-left h2 { font-size: 36px; }
      .form-embed iframe {
        height: 2800px; /* slightly shorter on mobile is fine */
      }
    }
  </style>
</head>
